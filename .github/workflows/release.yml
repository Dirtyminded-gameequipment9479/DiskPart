name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release date
        id: date
        run: echo "DATE=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Install lhasa
        run: sudo apt-get update -qq && sudo apt-get install -y lhasa

      - name: Regenerate icon
        run: python3 support/make_icon.py

      - name: Assemble archive contents
        run: |
          mkdir -p dist/DiskPart
          cp out/DiskPart.exe  dist/DiskPart/DiskPart.exe
          cp DiskPart.info     dist/DiskPart/DiskPart.info
          cp README.md         dist/DiskPart/README.md

      - name: Create LHA archive
        run: |
          cd dist
          lhasa c "DiskPart-${{ steps.date.outputs.DATE }}-PROTO.lha" DiskPart/
          ls -lh *.lha

      - name: Delete previous PROTO release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete proto --yes 2>/dev/null || true
          git push --delete origin proto 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create proto \
            --title "DiskPart ${{ steps.date.outputs.DATE }} PROTO" \
            --notes "Automated prototype build from commit \`${{ github.sha }}\`." \
            --prerelease \
            "dist/DiskPart-${{ steps.date.outputs.DATE }}-PROTO.lha"
